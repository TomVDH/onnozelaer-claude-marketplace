repos:
  - repo: local
    hooks:
      - id: adjudant-validate
        name: Adjudant — validate vault standards & template coherence
        entry: python3 adjudant/scripts/validate.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: marketplace-version-parity
        name: Marketplace — every plugin version matches its plugin.json
        entry: python3 scripts/check_marketplace_versions.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
